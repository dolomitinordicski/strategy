<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f6f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
:root{--deep:#0D4D5E;--mid:#417483;--light:#AAD0D1;--lighter:#D6ECED;--lightest:#EEF7F7;--text:#1a2e33;--muted:#5a7a83;--white:#fff}
.app{width:100%;max-width:800px;background:var(--white);border-radius:16px;box-shadow:0 4px 32px rgba(13,77,94,.12);overflow:hidden}

.logo-text{font-size:13px;font-weight:700;color:var(--deep);letter-spacing:.02em}

.header-btns{display:flex;gap:8px}

.progress-bar{height:3px;background:var(--lighter)}
.progress-fill{height:100%;background:var(--mid);transition:width .3s}
.toc{background:var(--lightest);border-bottom:1px solid var(--lighter);padding:12px 24px;display:none;grid-template-columns:1fr 1fr;gap:3px;max-height:280px;overflow-y:auto}
.toc.open{display:grid}
.toc-item{font-size:11px;padding:4px 8px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;text-align:left;transition:background .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toc-item:hover{background:var(--lighter)}
.toc-item.active{background:var(--light);color:var(--deep);font-weight:600}
.toc-num{opacity:.5;margin-right:4px}
.slide{min-height:380px;padding:26px 28px 18px}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-top:1px solid var(--lighter)}
.btn-nav{font-size:13px;padding:8px 18px;border-radius:8px;cursor:pointer;transition:all .15s}
.btn-prev{border:1px solid var(--lighter);background:transparent;color:var(--muted)}
.btn-prev:hover:not(:disabled){border-color:var(--light);color:var(--mid)}
.btn-prev:disabled,.btn-next:disabled{opacity:.35;cursor:default}
.btn-next{border:1px solid var(--mid);background:var(--mid);color:var(--white)}
.btn-next:hover:not(:disabled){background:var(--deep);border-color:var(--deep)}
.nav-counter{font-size:12px;color:var(--muted)}
.tag{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--mid);text-transform:uppercase;margin-bottom:8px}
.slide-title{font-size:21px;font-weight:700;color:var(--deep);margin-bottom:14px}
.quad-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quad-card{background:var(--lightest);border-radius:10px;padding:13px 15px;border:1px solid var(--lighter)}
.quad-card h3{font-size:13px;font-weight:700;color:var(--deep);margin-bottom:5px}
.quad-card p{font-size:12px;color:var(--muted);line-height:1.55}
.section-slide{background:linear-gradient(135deg,var(--deep) 0%,var(--mid) 100%);border-radius:14px;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px;text-align:center}
.section-num{font-size:52px;font-weight:800;color:var(--light);line-height:1;margin-bottom:8px}
.section-title{font-size:26px;font-weight:700;color:var(--white);margin-bottom:12px;max-width:520px}
.section-sub{font-size:15px;color:var(--lighter);max-width:420px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
.text-body{font-size:13px;color:var(--text);line-height:1.7;margin-bottom:9px}
.text-note{font-size:11px;color:var(--mid);font-style:italic;margin-top:12px}
.img-placeholder{background:var(--lightest);border-radius:12px;border:1px solid var(--lighter);min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:8px}
.img-caption{font-size:13px;color:var(--mid);text-align:center}
.img-sub{font-size:11px;color:var(--light);text-align:center}
.product-list{display:flex;flex-direction:column;gap:10px}
.product-item{display:flex;align-items:center;gap:14px;background:var(--lightest);border-radius:10px;padding:12px 15px;border:1px solid var(--lighter)}
.product-icon{width:40px;height:40px;background:var(--light);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.product-item h3{font-size:14px;font-weight:600;color:var(--deep)}
.product-item .tech{font-size:12px;color:var(--muted);margin-top:2px}
.product-note{font-size:11px;color:var(--mid);font-style:italic;text-align:right;max-width:130px;flex-shrink:0}
.list-right-grid{display:grid;grid-template-columns:180px 1fr;gap:26px;align-items:start}
.list-right-title{font-size:30px;font-weight:800;color:var(--deep);padding-top:4px}
.list-items{display:flex;flex-direction:column;gap:10px}
.list-item{border-left:3px solid var(--light);padding-left:13px}
.list-item h3{font-size:13px;font-weight:600;color:var(--deep);margin-bottom:2px}
.list-item p{font-size:12px;color:var(--muted);line-height:1.5}
.pilot-grid{display:grid;grid-template-columns:160px 1fr;gap:18px;align-items:start}
.pilot-title-box{background:linear-gradient(160deg,var(--deep),var(--mid));border-radius:12px;padding:18px 13px;text-align:center}

.pilot-items{display:flex;flex-direction:column;gap:8px}
.pilot-item{background:var(--lightest);border-radius:8px;padding:9px 12px;border:1px solid var(--lighter)}
.pilot-item h3{font-size:12px;font-weight:700;color:var(--deep);margin-bottom:3px}
.pilot-item p{font-size:12px;color:var(--muted);line-height:1.5}
.roadmap-note{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:14px}
.roadmap-steps{display:flex;flex-direction:column;gap:10px}
.roadmap-step{display:flex;gap:12px;align-items:stretch}
.roadmap-year{border-radius:8px;padding:11px 13px;min-width:84px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.roadmap-year span{font-size:12px;font-weight:700;text-align:center}
.roadmap-content{flex:1;background:var(--lightest);border-radius:8px;padding:10px 13px;border:1px solid var(--lighter)}
.roadmap-content h3{font-size:13px;font-weight:600;color:var(--deep);margin-bottom:3px}
.roadmap-content p{font-size:12px;color:var(--muted);line-height:1.55}
.invest-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.invest-table{width:100%;border-collapse:collapse}
.invest-table td{padding:7px 4px;font-size:12px;border-bottom:1px solid var(--lightest)}
.invest-table .opt td{color:var(--mid);font-style:italic}
.invest-table .bold td{font-weight:700;color:var(--deep)}
.alt-box{background:var(--lightest);border-radius:10px;padding:14px;border:1px solid var(--lighter);display:flex;flex-direction:column;justify-content:center}
.alt-box h3{font-size:13px;font-weight:600;color:var(--deep);margin-bottom:7px}
.alt-box p{font-size:12px;color:var(--muted);line-height:1.6}
.decision-items{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
.decision-item{background:var(--lightest);border-radius:8px;padding:11px 13px;border:1px solid var(--lighter)}
.decision-item h3{font-size:12px;font-weight:700;color:var(--deep);margin-bottom:3px}
.decision-item p{font-size:12px;color:var(--muted);line-height:1.55}
.decision-quote{background:linear-gradient(135deg,var(--deep),var(--mid));border-radius:10px;padding:16px 20px}
.decision-quote p{color:var(--white);font-size:13px;font-weight:500;line-height:1.65;text-align:center;font-style:italic}
.bullet-slide h2{font-size:14px;font-weight:700;color:var(--deep);margin:12px 0 5px}
.bullet-slide ul{padding-left:18px;margin-bottom:6px}
.bullet-slide ul li{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:2px}
.bullet-slide p{font-size:13px;color:var(--text);line-height:1.65;margin-bottom:8px}
.highlight-box{background:var(--lightest);border-radius:10px;padding:14px 16px;border:1px solid var(--light);margin-top:14px}
.highlight-box p{font-size:13px;font-weight:600;color:var(--deep);margin-bottom:4px}
.highlight-box ul{padding-left:16px}
.highlight-box ul li{font-size:12px;color:var(--mid);line-height:1.6}
.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.fin-table-wrap h3{font-size:13px;font-weight:700;color:var(--deep);margin-bottom:8px}
.fin-table{width:100%;border-collapse:collapse}
.fin-table thead tr{background:var(--light)}
.fin-table thead td{padding:7px 10px;font-size:12px;font-weight:700;color:var(--deep)}
.fin-table tbody tr{border-bottom:1px solid var(--lightest)}
.fin-table tbody td{padding:7px 10px;font-size:12px;color:var(--text)}
.fin-table tbody tr.bold td{font-weight:700;color:var(--deep)}
.phase2-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.phase2-table-wrap{}
.phase2-modules{background:var(--lightest);border-radius:10px;padding:14px 16px;border:1px solid var(--lighter)}
.phase2-modules h3{font-size:13px;font-weight:700;color:var(--deep);margin-bottom:6px}

.phase2-modules ul li{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:2px}

.risiko-item{display:flex;align-items:flex-start;gap:12px;background:var(--lightest);border-radius:9px;padding:12px 14px;border:1px solid var(--lighter)}
.risiko-dot{width:10px;height:10px;border-radius:50%;background:var(--light);flex-shrink:0;margin-top:3px}
.risiko-item p{font-size:13px;font-weight:600;color:var(--deep);line-height:1.4}
</style>
</head>

    it:{title:"Possibilità\navanzate",items:[
      {h:"Riconoscimento automatico (UHF)",b:"Gli utenti vengono rilevati automaticamente al passaggio di un punto di controllo."},
      {h:"Tracking di utilizzo e frequenze",b:"Quando, quanto spesso e dove vengono utilizzate le piste?"},
      {h:"Dashboard utente personalizzate",b:"Opzionale: statistiche individuali per i titolari di tessera."},
      {h:"Integrazione di servizi",b:"Offerte, partner e servizi regionali collegabili direttamente."}]}},
  // 15
  {type:"text-img",imgKey:"15ab",tag:"Armband / Braccialetto",
    de:{title:"Armband-Träger",body:"Der Armband-Träger ist die physische Halterung für die DNS-Saisonkarte. Er wurde für maximale Robustheit und Funktionalität im Outdoor-Einsatz entwickelt und trägt die RFID/UHF-Card sicher am Handgelenk.\n\nDurch seine hohe Sichtbarkeit dient er gleichzeitig als Erkennungszeichen der DNS-Community und ermöglicht eine schnelle visuelle Identifikation bei Kontrollen. Die Card selbst bleibt jederzeit im Träger – kein Herausnehmen nötig.",note:"Hersteller/Implementierung: SAXE"},
    it:{title:"Porta-card da braccio",body:"Il porta-card da braccio è il supporto fisico per la tessera stagionale DNS. È stato sviluppato per massima robustezza e funzionalità nell'uso outdoor e mantiene la card RFID/UHF al polso in modo sicuro.\n\nGrazie alla sua alta visibilità funge anche da segno di riconoscimento della community DNS e consente una rapida identificazione visiva durante i controlli. La card rimane sempre nel porta-card – non è necessario estrarla.",note:"Produttore/Implementazione: SAXE"}},
  // 16
  {type:"text-img",imgKey:16,tag:"Hausloipe / Pista di casa",
    de:{title:"Hausloipe",body:"Die Hausloipe ist ein zentrales Element im Ticketing-System und muss beim Kauf einer Saisonkarte verpflichtend ausgewählt werden.\n\nSie definiert die primäre Nutzungsregion des Karteninhabers und wird über ein einfaches Dropdown-Menü im Kaufprozess festgelegt. Diese Auswahl bildet die Grundlage für das Clearing-System und die Umsatzverteilung.",note:"Implementierung: PRIOT Smart Track / FACTORY"},
    it:{title:"Pista di casa (Hausloipe)",body:"La pista di casa è un elemento centrale nel sistema di ticketing e deve essere obbligatoriamente selezionata al momento dell'acquisto di una tessera stagionale.\n\nDefinisce la regione di utilizzo principale del titolare e viene stabilita tramite un semplice menu a tendina. Questa scelta è la base per il sistema di clearing e la distribuzione dei ricavi.",note:"Implementazione: PRIOT Smart Track / FACTORY"}},
  // 17
  {type:"quad",tag:"Clearing-System",
    de:{title:"Clearing-System",items:[
      {h:"Finanzneutralität",b:"DNS agiert als neutraler Systemkoordinator ohne eigene Gewinnabsicht. Alle Einnahmen fließen direkt an die Regionen."},
      {h:"Hausloipe-Prinzip",b:"Die gewählte Hausloipe bestimmt die primäre Zuordnung der Erlöse. Sie ist der Schlüssel zur fairen Verteilung."},
      {h:"Erlösverteilung",b:"Einnahmen werden nach klaren Regeln an die teilnehmenden Regionen verteilt. Nutzungsdaten bilden die Basis."},
      {h:"Transparenz",b:"Vollständige Nachvollziehbarkeit aller Geldflüsse. Jede Region erhält detaillierte Abrechnungen."}]},
    it:{title:"Sistema di clearing",items:[
      {h:"Neutralità finanziaria",b:"DNS agisce come coordinatore neutrale senza scopo di lucro. Tutti i ricavi affluiscono direttamente alle regioni."},
      {h:"Principio Hausloipe",b:"La pista di casa scelta determina l'attribuzione primaria dei ricavi. È la chiave per una distribuzione equa."},
      {h:"Distribuzione dei ricavi",b:"I ricavi vengono distribuiti alle regioni secondo regole chiare. I dati di utilizzo sono la base."},
      {h:"Trasparenza",b:"Piena tracciabilità di tutti i flussi finanziari. Ogni regione riceve rendiconti dettagliati."}]}},
  // 18
  {type:"text-img",imgKey:18,tag:"Wochenkarte DNS",
    de:{title:"Wochenkarte DNS",body:"Die Wochenkarte ist ein vollständig digitales Ticket. Nach dem Kauf wird es direkt auf das Smartphone heruntergeladen und im digitalen Wallet gespeichert – kompatibel mit Apple Wallet, Google Wallet und Samsung Wallet.\n\nKeine physische Karte, kein Ausdrucken – das Ticket ist jederzeit am Smartphone verfügbar. Ideal für Gäste: schneller Kauf, sofortige Nutzung und maximale Flexibilität.",note:"Implementierung: LTS Shop"},
    it:{title:"Tessera settimanale DNS",body:"La tessera settimanale è un biglietto completamente digitale. Dopo l'acquisto viene scaricato direttamente sullo smartphone e salvato nel wallet digitale – compatibile con Apple Wallet, Google Wallet e Samsung Wallet.\n\nNessuna tessera fisica, nessuna stampa – il biglietto è sempre disponibile sullo smartphone. Ideale per gli ospiti: acquisto rapido, utilizzo immediato e massima flessibilità.",note:"Implementazione: LTS Shop"}},
  // 19
  {type:"text-img",imgKey:19,tag:"Guest Card Integration",
    de:{title:"Guest Card Integration",body:"Die Guest Card Integration ermöglicht eine nahtlose Erweiterung bestehender Systeme. Durch eine Add-on-Logik können regionale Gästekarten einfach mit dem DNS-Ticketing verknüpft werden.\n\nDies schafft Mehrwert für Gäste und Regionen gleichermaßen, ohne bestehende Strukturen zu ersetzen. Die modulare Architektur erlaubt flexible Anpassungen je nach regionalen Anforderungen.",note:"Implementierung: LTS Shop"},
    it:{title:"Integrazione Guest Card",body:"L'integrazione della Guest Card consente un'estensione seamless dei sistemi esistenti. Tramite una logica add-on, le guest card regionali possono essere collegate facilmente al sistema di ticketing DNS.\n\nQuesto crea valore aggiunto per ospiti e regioni, senza sostituire le strutture esistenti. L'architettura modulare consente adattamenti flessibili in base alle esigenze regionali.",note:"Implementazione: LTS Shop"}},
  // 20
  {type:"text-img",imgKey:20,tag:"Tageskarten / Biglietti giornalieri",
    de:{title:"Tageskarten",body:"Das Tageskartensystem bleibt vollständig regional organisiert. Jede Region behält die volle Kontrolle über ihr Tageskartenangebot und kann Preise, Gültigkeit und Vertriebswege eigenständig festlegen.\n\nGäste haben freie Systemwahl ohne DNS-Vorgaben. Diese dezentrale Struktur respektiert regionale Autonomie und ermöglicht flexible, bedarfsgerechte Lösungen vor Ort.",note:"Implementierung: bestehende regionale Systeme / optional UHF-Polesticker"},
    it:{title:"Biglietti giornalieri",body:"Il sistema dei biglietti giornalieri rimane completamente organizzato a livello regionale. Ogni regione mantiene il pieno controllo sulla propria offerta e può stabilire autonomamente prezzi, validità e canali di distribuzione.\n\nGli ospiti hanno libera scelta del sistema senza vincoli DNS. Questa struttura decentralizzata rispetta l'autonomia regionale e consente soluzioni flessibili e adeguate alle esigenze locali.",note:"Implementazione: sistemi regionali esistenti / opz. UHF-Polesticker"}},
  // 21

  // 23
  {type:"quad",tag:"Kontrollstrategie / Strategia di controllo",
    de:{title:"Kontrollstrategie",items:[
      {h:"Keine Flächenkontrolle",b:"Verzicht auf flächendeckende Kontrollen. Ressourcenschonender Ansatz ohne permanente Überwachung aller Loipen."},
      {h:"Strategische Punkte",b:"Fokussierung auf neuralgische Kontrollpunkte. Gezielte Präsenz an stark frequentierten Zugängen."},
      {h:"Mobile Kontrolle",b:"Flexible Kontrollteams mit mobilen Geräten. Schnelle Reaktion und gezielte Einsätze nach Bedarf."},
      {h:"Effiziente Umsetzung",b:"Schlanke Prozesse mit maximaler Wirkung. Minimaler Aufwand bei optimaler Durchsetzung der Ticketpflicht."}]},
    it:{title:"Strategia di controllo",items:[
      {h:"Nessun controllo a tappeto",b:"Rinuncia a controlli capillari. Approccio risparmioso di risorse senza sorveglianza permanente di tutte le piste."},
      {h:"Punti strategici",b:"Concentrazione sui punti nevralgici. Presenza mirata agli accessi più frequentati."},
      {h:"Controllo mobile",b:"Team di controllo flessibili con dispositivi mobili. Reazione rapida e interventi mirati."},
      {h:"Attuazione efficiente",b:"Processi snelli con massimo effetto. Sforzo minimo per un'applicazione ottimale dell'obbligo di biglietto."}]}},
  // 24
  {type:"quad",tag:"Systemlogik Kontrolle / Logica di sistema controllo",
    de:{title:"Systemlogik Kontrolle",items:[
      {h:"RFID-Kontrolle",b:"Saisonkarten-Inhaber werden über RFID/NFC-Armbänder identifiziert. Schnelle, kontaktlose Erfassung an strategischen Kontrollpunkten."},
      {h:"Kombinierte Nutzung",b:"Beide Systeme arbeiten parallel und ergänzen sich. Flexible Kontrolle je nach Ticketart und Situation vor Ort."},
      {h:"QR-Kontrolle",b:"Wochenkarten nutzen digitale QR-Codes zur Verifikation. Einfaches Scannen per Smartphone oder stationärem Lesegerät."},
      {h:"Nahtlose Verifikation",b:"Einheitliche Systemlogik ermöglicht reibungslose Verifikation. Minimaler Aufwand für Personal und Nutzer gleichermaßen."}]},
    it:{title:"Logica di sistema controllo",items:[
      {h:"Controllo RFID",b:"I titolari di tessera stagionale vengono identificati tramite braccialetti RFID/NFC. Rilevamento rapido e contactless."},
      {h:"Utilizzo combinato",b:"Entrambi i sistemi funzionano in parallelo e si integrano. Controllo flessibile in base al tipo di biglietto."},
      {h:"Controllo QR",b:"Le tessere settimanali utilizzano codici QR digitali per la verifica. Scansione semplice con smartphone o lettore fisso."},
      {h:"Verifica seamless",b:"Logica di sistema uniforme consente una verifica fluida. Sforzo minimo per il personale e gli utenti."}]}},
  // 25
  {type:"text-img",tag:"Incentivierung / Incentivazione",
    de:{title:"Incentivierung",body:"Das Scansystem basiert auf Freiwilligkeit und einfacher Logik. Nutzer werden durch ein attraktives Belohnungssystem motiviert, ihre Karten an Kontrollpunkten zu scannen.\n\nDurch gezielte Anreize wie Rabatte, Bonuspunkte oder exklusive Vorteile entsteht eine Win-Win-Situation: höhere Datenqualität für DNS bei gleichzeitigem Mehrwert für die Nutzer.",note:"Mögliche Erweiterungen"},
    it:{title:"Incentivazione",body:"Il sistema di scansione si basa sulla volontarietà e su una logica semplice. Gli utenti sono motivati da un sistema di premi attrattivo a scansionare le loro tessere ai punti di controllo.\n\nGrazie a incentivi mirati come sconti, punti bonus o vantaggi esclusivi si crea una situazione win-win: maggiore qualità dei dati per DNS e valore aggiunto per gli utenti.",note:"Possibili estensioni"}},
  // 26
  {type:"quad",tag:"Operatives Modell / Modello operativo",
    de:{title:"Operatives Modell",items:[
      {h:"Zentrale Steuerung",b:"Zentrale Steuerungsmöglichkeit bei dezentraler Umsetzung. Einheitliche Standards und klare Verantwortlichkeiten."},
      {h:"Geringe Komplexität",b:"Reduzierte Systemkomplexität durch klare Strukturen. Wenige Schnittstellen, einfache Wartung."},
      {h:"Schlanke Prozesse",b:"Minimaler administrativer Aufwand durch automatisierte Abläufe. Fokus auf Kernprozesse ohne Overhead."},
      {h:"Skalierbarkeit",b:"Flexible Erweiterung ohne Systemumbau. Wachstum ohne proportionalen Ressourcenanstieg."}]},
    it:{title:"Modello operativo",items:[
      {h:"Gestione centrale",b:"Possibilità di gestione centrale con attuazione decentralizzata. Standard uniformi e responsabilità chiare."},
      {h:"Bassa complessità",b:"Complessità di sistema ridotta grazie a strutture chiare. Poche interfacce, manutenzione semplice."},
      {h:"Processi snelli",b:"Sforzo amministrativo minimo grazie a processi automatizzati. Focus sui processi chiave senza overhead."},
      {h:"Scalabilità",b:"Espansione flessibile senza ristrutturazione del sistema. Crescita senza aumento proporzionale delle risorse."}]}},
  // 27
  {type:"listright",tag:"Strategische Weichenstellungen / Orientamenti strategici",
    de:{title:"Strategische\nWeichen-\nstellungen",items:[
      {h:"Datenschutz & Rollenverteilung",b:"Klärung der Verantwortlichkeiten zwischen DNS, Regionen und PRIOT im Hinblick auf DSGVO und Datenverwaltung."},
      {h:"Administrativer Aufwand",b:"Bewertung des zusätzlichen Aufwands für Verkaufsstellen, Kontrolleure, Regionen und DNS."},
      {h:"Langfristige Betriebskosten",b:"Abschätzung der jährlichen Kosten für Betrieb, Wartung, Lizenzen und Weiterentwicklung."},
      {h:"Governance-Modell DNS / Regionen",b:"Definition der Aufgaben und Zuständigkeiten zwischen DNS und den einzelnen Regionen."},
      {h:"Erkenntnisse aus dem Pilot",b:"Bewertung von Technologie, Akzeptanz, Datenqualität und Skalierbarkeit als Grundlage für weitere Entscheidungen."}]},
    it:{title:"Orientamenti\nstrategici",items:[
      {h:"Privacy & ripartizione dei ruoli",b:"Chiarimento delle responsabilità tra DNS, regioni e PRIOT in merito al GDPR e alla gestione dei dati."},
      {h:"Onere amministrativo",b:"Valutazione del carico aggiuntivo per punti vendita, controllori, regioni e DNS."},
      {h:"Costi operativi a lungo termine",b:"Stima dei costi annuali per operazioni, manutenzione, licenze e sviluppo."},
      {h:"Modello di governance DNS / Regioni",b:"Definizione dei compiti e delle responsabilità tra DNS e le singole regioni."},
      {h:"Conoscenze dal pilota",b:"Valutazione di tecnologia, accettazione, qualità dei dati e scalabilità come base per ulteriori decisioni."}]}},

function renderSlide(s){
  var data=d(s);
  switch(s.type){
    case"section":
      return '<div class="section-slide">'+(s.num?'<div class="section-num">'+s.num+'</div>':'')+
        '<div class="section-title">'+data.title+'</div>'+
        (data.sub?'<div class="section-sub">'+data.sub+'</div>':'')+
        '</div>';
    case"quad":
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="slide-title">'+data.title+'</div>'+
        '<div class="quad-grid">'+data.items.map(function(it){
          return'<div class="quad-card"><h3>'+it.h+'</h3><p>'+it.b+'</p></div>';
        }).join('')+'</div>';
    case"text-img-points":
      var imgTop=s.imgKey?imgEl(s.imgKey,140):'';
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="two-col"><div>'+
        '<div class="slide-title">'+data.title+'</div>'+
        data.body.split('\n\n').map(function(p){return'<p class="text-body">'+p+'</p>';}).join('')+
        (data.note?'<div class="text-note">'+data.note+'</div>':'')+
        '</div><div>'+imgTop+
        '<div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">'+
        data.items.map(function(it){
          return'<div style="border-left:3px solid var(--light);padding-left:12px">'+
            '<div style="font-size:12px;font-weight:700;color:var(--deep)">'+it.h+'</div>'+
            '<div style="font-size:12px;color:var(--muted);line-height:1.5">'+it.b+'</div></div>';
        }).join('')+
        '</div></div></div>';
    case"text-img":
    case"text-img":
      var imgRight2='';
      if(s.imgKey==='15ab'){
        imgRight2=imgSlider('15a','15b',220);

        imgRight2=imgEl(s.imgKey,220);
      } else {
        imgRight2='<div class="img-placeholder"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#417483" stroke-width="1.6"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg><div class="img-caption">DOLOMITI NORDICSKI</div></div>';

      }
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="two-col"><div>'+
        '<div class="slide-title">'+data.title.replace(/\n/g,'<br>')+'</div>'+
        data.body.split('\n\n').map(function(p){return'<p class="text-body">'+p+'</p>';}).join('')+

    case"roadmap":
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+

          return'<tr class="'+(r.bold?"bold":"")+(r.opt?" opt":"")+'"><td>'+r.el+'</td><td style="text-align:right">'+r.val+'</td></tr>';

      function finTable(t){

function buildToc(){
  var toc=document.getElementById('toc');
  toc.innerHTML=slides.map(function(s,i){
    var label=s.tag||(d(s).title)||'';
    return'<button class="toc-item'+(i===current?' active':'')+'" onclick="goTo('+i+')">'+
      '<span class="toc-num">'+(i+1)+'.</span>'+label.substring(0,36)+'</button>';
  }).join('');
}

function render(){
  document.getElementById('slide').innerHTML=renderSlide(slides[current]);
  document.getElementById('progress').style.width=((current+1)/slides.length*100)+'%';
  var L=lang==='de'
    ?{prev:'← Zurück',next:'Weiter →',slide:'Folie',of:'von',lang:'IT'}
    :{prev:'← Indietro',next:'Avanti →',slide:'Diapositiva',of:'di',lang:'DE'};
  document.getElementById('prevBtn').textContent=L.prev;
  document.getElementById('nextBtn').textContent=L.next;
  document.getElementById('langBtn').textContent=L.lang;
  document.getElementById('counter').textContent=L.slide+' '+(current+1)+' '+L.of+' '+slides.length;
  document.getElementById('prevBtn').disabled=current===0;
  document.getElementById('nextBtn').disabled=current===slides.length-1;
  buildToc();
}

function switchImg(idx){
  var a=document.getElementById('sliderImgA');
  var b=document.getElementById('sliderImgB');
  var b0=document.getElementById('sliderBtn0');
  var b1=document.getElementById('sliderBtn1');
  if(!a||!b) return;
  a.style.opacity=idx===0?'1':'0';
  b.style.opacity=idx===1?'1':'0';
  b0.style.background=idx===0?'rgba(255,255,255,.25)':'transparent';
  b0.style.color=idx===0?'#AAD0D1':'rgba(170,208,209,.5)';
  b1.style.background=idx===1?'rgba(255,255,255,.25)':'transparent';
  b1.style.color=idx===1?'#AAD0D1':'rgba(170,208,209,.5)';
}

function go(dir){current=Math.max(0,Math.min(slides.length-1,current+dir));render();}
function goTo(i){current=i;document.getElementById('toc').classList.remove('open');document.getElementById('tocBtn').classList.remove('active');render();}
function toggleToc(){document.getElementById('toc').classList.toggle('open');document.getElementById('tocBtn').classList.toggle('active');buildToc();}
function toggleLang(){lang=lang==='de'?'it':'de';render();}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);
  if(e.key==='f'||e.key==='F')toggleFullscreen();
  if(e.key==='Escape'&&document.fullscreenElement)document.exitFullscreen();
});

function toggleFullscreen(){
  var el=document.documentElement;
  if(!document.fullscreenElement){
    (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen).call(el);
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||document.msExitFullscreen).call(document);
  }
}

document.addEventListener('fullscreenchange',function(){
  var btn=document.getElementById('fsBtn');
  var app=document.querySelector('.app');
  var body=document.body;
  if(document.fullscreenElement){
    btn.textContent='✕ Vollbild';
    var scaleX=window.screen.width/820;
    var scaleY=window.screen.height/700;
    var scale=Math.min(scaleX,scaleY,2);
    body.style.cssText='margin:0;padding:0;background:#0D4D5E;display:flex;align-items:center;justify-content:center;min-height:100vh;';
    app.style.cssText='width:800px;max-width:800px;border-radius:16px;box-shadow:none;transform:scale('+scale+');transform-origin:center center;';
  } else {
    btn.textContent='⛶';
    body.style.cssText='font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f6f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;';
    app.style.cssText='width:100%;max-width:800px;background:var(--white);border-radius:16px;box-shadow:0 4px 32px rgba(13,77,94,.12);overflow:hidden;';
  }
});
render();
</script>
</body>
</html>
