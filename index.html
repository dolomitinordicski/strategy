<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f6f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
:root{--deep:#0D4D5E;--mid:#417483;--light:#AAD0D1;--lighter:#D6ECED;--lightest:#EEF7F7;--text:#1a2e33;--muted:#5a7a83;--white:#fff}
.app{width:100%;max-width:800px;background:var(--white);border-radius:16px;box-shadow:0 4px 32px rgba(13,77,94,.12);overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--lighter)}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:36px;width:auto;object-fit:contain}
.logo-sub{font-size:11px;color:var(--muted);border-left:1px solid var(--lighter);padding-left:10px}
.header-btns{display:flex;gap:7px}
.btn-sm{font-size:12px;padding:5px 11px;border-radius:7px;border:1px solid var(--lighter);background:transparent;color:var(--muted);cursor:pointer;transition:background .15s}
.btn-sm:hover,.btn-sm.active{background:var(--lightest);border-color:var(--light)}
.btn-docs{border-color:var(--light);color:var(--deep);font-weight:700}
.progress-bar{height:3px;background:var(--lighter)}
.progress-fill{height:100%;background:var(--mid);transition:width .3s}
.toc{background:var(--lightest);border-bottom:1px solid var(--lighter);padding:10px 22px;display:none;grid-template-columns:1fr 1fr;gap:2px;max-height:260px;overflow-y:auto}
.toc.open{display:grid}
.toc-item{font-size:11px;padding:4px 8px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toc-item:hover{background:var(--lighter)}
.toc-item.active{background:var(--light);color:var(--deep);font-weight:700}
.toc-num{opacity:.45;margin-right:4px}
.slide{min-height:380px;padding:24px 26px 16px}
.nav{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;border-top:1px solid var(--lighter)}
.btn-nav{font-size:13px;padding:7px 16px;border-radius:8px;cursor:pointer;transition:all .15s}
.btn-prev{border:1px solid var(--lighter);background:transparent;color:var(--muted)}
.btn-prev:hover:not(:disabled){border-color:var(--light);color:var(--mid)}
.btn-prev:disabled,.btn-next:disabled{opacity:.3;cursor:default}
.btn-next{border:1px solid var(--mid);background:var(--mid);color:var(--white)}
.btn-next:hover:not(:disabled){background:var(--deep);border-color:var(--deep)}
.nav-counter{font-size:12px;color:var(--muted)}
.tag{font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--mid);text-transform:uppercase;margin-bottom:7px}
.slide-title{font-size:21px;font-weight:700;color:var(--deep);margin-bottom:13px;line-height:1.25}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
.text-body{font-size:13px;color:var(--text);line-height:1.7;margin-bottom:8px}
.text-note{font-size:11px;color:var(--mid);font-style:italic;margin-top:10px}
.quad-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qcard{background:var(--lightest);border-radius:10px;padding:13px 14px;border:1px solid var(--lighter)}
.qcard h3{font-size:13px;font-weight:700;color:var(--deep);margin-bottom:4px}
.qcard p{font-size:12px;color:var(--muted);line-height:1.55}
.section-wrap{background:linear-gradient(135deg,var(--deep) 0%,var(--mid) 100%);border-radius:14px;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 32px;text-align:center}
.section-num{font-size:52px;font-weight:800;color:var(--light);line-height:1;margin-bottom:8px}
.section-title{font-size:26px;font-weight:700;color:var(--white);margin-bottom:10px;max-width:520px}
.section-sub{font-size:15px;color:var(--lighter);max-width:420px}
.list-right{display:grid;grid-template-columns:175px 1fr;gap:24px;align-items:start}
.list-right-title{font-size:28px;font-weight:800;color:var(--deep);padding-top:4px;line-height:1.2}
.list-items{display:flex;flex-direction:column;gap:9px}
.list-item{border-left:3px solid var(--light);padding-left:12px}
.list-item h3{font-size:13px;font-weight:600;color:var(--deep);margin-bottom:2px}
.list-item p{font-size:12px;color:var(--muted);line-height:1.5}
.product-list{display:flex;flex-direction:column;gap:9px}
.product-item{display:flex;align-items:center;gap:13px;background:var(--lightest);border-radius:10px;padding:11px 14px;border:1px solid var(--lighter)}
.product-icon{width:40px;height:40px;background:var(--lightest);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--lighter)}
.product-item h3{font-size:13px;font-weight:600;color:var(--deep)}
.product-item .tech{font-size:11px;color:var(--muted);margin-top:2px}
.product-note{font-size:11px;color:var(--mid);font-style:italic;text-align:right;max-width:120px;flex-shrink:0}
.pilot-grid{display:grid;grid-template-columns:155px 1fr;gap:16px;align-items:start}
.pilot-box{background:linear-gradient(160deg,var(--deep),var(--mid));border-radius:12px;padding:18px 12px;text-align:center}
.pilot-box h2{font-size:17px;font-weight:800;color:var(--white);line-height:1.3}
.pilot-items{display:flex;flex-direction:column;gap:7px}
.pilot-item{background:var(--lightest);border-radius:8px;padding:9px 11px;border:1px solid var(--lighter)}
.pilot-item h3{font-size:12px;font-weight:700;color:var(--deep);margin-bottom:2px}
.pilot-item p{font-size:12px;color:var(--muted);line-height:1.5}
.roadmap-note{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:12px}
.roadmap-steps{display:flex;flex-direction:column;gap:9px}
.roadmap-step{display:flex;gap:11px;align-items:stretch}
.roadmap-year{border-radius:8px;padding:10px 12px;min-width:82px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.roadmap-year span{font-size:12px;font-weight:700;text-align:center}
.roadmap-content{flex:1;background:var(--lightest);border-radius:8px;padding:10px 12px;border:1px solid var(--lighter)}
.roadmap-content h3{font-size:13px;font-weight:600;color:var(--deep);margin-bottom:3px}
.roadmap-content p{font-size:12px;color:var(--muted);line-height:1.55}
.risiko-list{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.risiko-item{display:flex;align-items:flex-start;gap:11px;background:var(--lightest);border-radius:9px;padding:11px 13px;border:1px solid var(--lighter)}
.risiko-dot{width:9px;height:9px;border-radius:50%;background:var(--light);flex-shrink:0;margin-top:4px}
.risiko-item p{font-size:13px;font-weight:600;color:var(--deep);line-height:1.4}
.invest-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.inv-table{width:100%;border-collapse:collapse}
.inv-table td{padding:7px 4px;font-size:12px;border-bottom:1px solid var(--lightest)}
.inv-opt td{color:var(--mid);font-style:italic}
.inv-bold td{font-weight:700;color:var(--deep)}
.alt-box{background:var(--lightest);border-radius:10px;padding:13px;border:1px solid var(--lighter)}
.alt-box h3{font-size:13px;font-weight:600;color:var(--deep);margin-bottom:6px}
.alt-box p{font-size:12px;color:var(--muted);line-height:1.6}
.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.fin-wrap h3{font-size:13px;font-weight:700;color:var(--deep);margin-bottom:7px}
.fin-table{width:100%;border-collapse:collapse}
.fin-table td{padding:6px 10px;font-size:12px;border-bottom:1px solid var(--lightest)}
.fin-bold td{font-weight:700;color:var(--deep)}
.phase2-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.phase2-mod{background:var(--lightest);border-radius:10px;padding:13px;border:1px solid var(--lighter)}
.phase2-mod h3{font-size:13px;font-weight:700;color:var(--deep);margin-bottom:5px}
.phase2-mod p{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:7px}
.phase2-mod ul{padding-left:15px}
.phase2-mod li{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:2px}
.decision-items{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.dec-item{background:var(--lightest);border-radius:8px;padding:10px 12px;border:1px solid var(--lighter)}
.dec-item h3{font-size:12px;font-weight:700;color:var(--deep);margin-bottom:3px}
.dec-item p{font-size:12px;color:var(--muted);line-height:1.55}
.dec-quote{background:linear-gradient(135deg,var(--deep),var(--mid));border-radius:10px;padding:15px 20px}
.dec-quote p{color:var(--white);font-size:13px;font-weight:500;line-height:1.65;text-align:center;font-style:italic}
.bullet-wrap p{font-size:13px;color:var(--text);line-height:1.65;margin-bottom:7px}
.bullet-wrap h2{font-size:14px;font-weight:700;color:var(--deep);margin:11px 0 4px}
.bullet-wrap ul{padding-left:17px;margin-bottom:6px}
.bullet-wrap li{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:2px}
.hl-box{background:var(--lightest);border-radius:10px;padding:12px 15px;border:1px solid var(--light);margin-top:12px}
.hl-box p{font-size:13px;font-weight:600;color:var(--deep);margin-bottom:4px}
.hl-box ul{padding-left:15px}
.hl-box li{font-size:12px;color:var(--mid);line-height:1.6}
.video-wrap{margin-top:10px;border-radius:10px;overflow:hidden;border:1px solid var(--light)}
.video-label{background:var(--deep);padding:5px 11px;font-size:11px;font-weight:600;color:var(--light);letter-spacing:.05em}
.link-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:7px 13px;background:var(--lightest);border:1px solid var(--light);border-radius:8px;font-size:12px;font-weight:600;color:var(--deep);text-decoration:none}
.link-btn:hover{background:var(--lighter)}
.img-caption{font-size:11px;color:var(--muted);text-align:center;margin-top:5px;font-style:italic}
/* overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(13,77,94,.55);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.overlay-box{background:var(--white);border-radius:16px;width:90%;max-width:520px;box-shadow:0 8px 40px rgba(13,77,94,.25);overflow:hidden}
.overlay-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--deep)}
.overlay-head span{font-size:14px;font-weight:700;color:var(--white)}
.overlay-head button{background:transparent;border:none;color:var(--light);font-size:20px;cursor:pointer;line-height:1}
.overlay-body{padding:18px 20px;display:flex;flex-direction:column;gap:6px}
.docs-cat{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--mid);text-transform:uppercase;margin-top:10px}
.docs-cat:first-child{margin-top:0}
.docs-link{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--lightest);border:1px solid var(--lighter);border-radius:8px;font-size:12px;font-weight:500;color:var(--deep);text-decoration:none}
.docs-link:hover{background:var(--lighter)}
</style>

    de:{title:'Ausgangslage',body:'DNS ist ein Netzwerk verschiedener Langlaufregionen in den Dolomiten. Langlauf funktioniert als offenes System – Loipen sind frei zugänglich und schwer kontrollierbar.\n\nKlassische Ticketing-Modelle aus dem Alpin-Bereich lassen sich nicht übertragen. Die Herausforderung: Ein System entwickeln, das dieser offenen Struktur gerecht wird.'},
    it:{title:'Situazione iniziale',body:'DNS è una rete di diverse regioni di sci di fondo nelle Dolomiti. Lo sci di fondo funziona come sistema aperto – le piste sono liberamente accessibili e difficili da controllare.\n\nI modelli di ticketing classici del settore alpino non sono trasferibili. La sfida: sviluppare un sistema adeguato a questa struttura aperta.'}},

  {type:'textimg',imgKey:9,tag:'Saisonkarte / Tessera stagionale',
    de:{title:'Saisonkarte (DNS)',body:'Die DNS-Saisonkarte ist eine RFID/UHF-Card im Kreditkartenformat mit integriertem Chip. Sie wird in einer robusten Armband-Halterung am Handgelenk getragen und ist direkt mit dem persönlichen Nutzerkonto verknüpft.\n\nDie Kombination aus Card und Armband-Träger ermöglicht automatische Erkennung beim Passieren von Kontrollpunkten – ohne Anhalten, ohne Scannen. Nutzungsdaten werden erfasst und der Clearing-Prozess automatisiert.',note:'Implementierung: PRIOT'},
    it:{title:'Tessera stagionale (DNS)',body:'La tessera stagionale DNS è una card RFID/UHF in formato carta di credito con chip integrato. Viene portata in un porta-card da braccio robusto e collegata direttamente all\'account personale.\n\nLa combinazione card + porta-card consente il riconoscimento automatico al passaggio dei punti di controllo – senza fermarsi, senza scansione. I dati di utilizzo vengono registrati e il processo di clearing automatizzato.',note:'Implementazione: PRIOT'}},

  {type:'section',tag:'Der technologische Ansatz / L\'approccio tecnologico',
    de:{title:'Der technologische Ansatz',sub:'PRIOT Smart Track'},
    it:{title:'L\'approccio tecnologico',sub:'PRIOT Smart Track'}},

  {type:'textimgpoints',imgKey:12,tag:'PRIOT Smart Track',
    link:{label:'www.priot.io',url:'https://www.priot.io/'},
    de:{title:'PRIOT Smart Track',body:'PRIOT ist ein slowenisches Unternehmen, das eine integrierte Hardware- und Software-Lösung für das nordische Skizentrum Planica entwickelt hat. Das System umfasst vernetzte Messstationen, mobile Validierungsgeräte und eine cloud-basierte Plattform zur Ticketverwaltung und Nutzungsanalyse.\n\nSeit mehreren Saisons im Einsatz, bildet PRIOT Smart Track die technologische Grundlage für Zutrittskontrolle und Datenmanagement im Langlaufbereich.',
      items:[{h:'Cloud-basiertes System',b:'Zentrale Datenstruktur, vernetzte Messstationen (LTE).'},
             {h:'Multi-Ticket-Support',b:'Verschiedene Tickettypen parallel im gleichen System.'},
             {h:'UHF-Technologie',b:'Automatische Erkennung ohne Anhalten des Nutzers.'}]},
    it:{title:'PRIOT Smart Track',body:'PRIOT è un\'azienda slovena che ha sviluppato una soluzione integrata hardware e software per il centro nordico di Planica. Il sistema comprende stazioni di misurazione collegate, dispositivi di validazione mobili e una piattaforma cloud per la gestione dei biglietti e l\'analisi dell\'utilizzo.\n\nAttivo da diverse stagioni, PRIOT Smart Track costituisce la base tecnologica per il controllo degli accessi e la gestione dei dati nel fondo.',
      items:[{h:'Sistema cloud-based',b:'Struttura dati centrale, stazioni collegate (LTE).'},
             {h:'Multi-ticket support',b:'Diversi tipi di biglietto in parallelo nello stesso sistema.'},
             {h:'Tecnologia UHF',b:'Riconoscimento automatico senza fermare l\'utente.'}]}},

  {type:'textimg',imgKey:13,tag:'Funktionsweise des Systems',
    video:'https://www.youtube.com/watch?v=3nJNKg5Tz5c',
    pdflink:{label:'Smart Tracks – System Overview (PDF)',url:'https://github.com/dolomitinordicski/strategy/blob/main/Smart%20Tracks.pdf'},
    de:{title:'Funktionsweise\ndes Systems',body:'Tickets enthalten digitale Zugriffsrechte und werden über vernetzte Messstationen validiert.\n\nDie zentrale Datenbank arbeitet nach einer cloud-first Architektur und bietet Echtzeit-Überblick über Nutzung und Status. Inspektoren nutzen mobile Geräte mit integrierter Langstreckenantenne – die Ticketgültigkeit kann geprüft werden, ohne den Besucher anzuhalten.'},
    it:{title:'Funzionamento\ndel sistema',body:'I biglietti contengono diritti di accesso digitali e vengono validati tramite stazioni di misurazione collegate.\n\nIl database centrale lavora con architettura cloud-first e offre una panoramica in tempo reale. Gli ispettori utilizzano dispositivi mobili con antenna integrata – la validità del biglietto può essere verificata senza fermare il visitatore.'}},

  {type:'textimg',imgKey:'15ab',tag:'Armband-Träger / Porta-card da braccio',
    de:{title:'Armband-Träger',body:'Der Armband-Träger ist die physische Halterung für die DNS-Saisonkarte (RFID/UHF-Card im Kreditkartenformat). Er wurde für maximale Robustheit und Funktionalität im Outdoor-Einsatz entwickelt und trägt die Card sicher am Handgelenk.\n\nDurch seine hohe Sichtbarkeit dient er gleichzeitig als Erkennungszeichen der DNS-Community. Die Card bleibt jederzeit im Träger – kein Herausnehmen nötig. Robust, wasserdicht, für die gesamte Saison.',note:'Hersteller/Implementierung: SAXE'},
    it:{title:'Porta-card da braccio',body:'Il porta-card da braccio è il supporto fisico per la tessera stagionale DNS (card RFID/UHF in formato carta di credito). È stato sviluppato per massima robustezza e funzionalità nell\'uso outdoor e mantiene la card al polso in modo sicuro.\n\nGrazie alla sua alta visibilità funge anche da segno di riconoscimento della community DNS. La card rimane sempre nel porta-card – non è necessario estrarla. Robusto, impermeabile, per tutta la stagione.',note:'Produttore/Implementazione: SAXE'}},

  {type:'textimg',imgKey:16,tag:'Hausloipe / Pista di casa',
    de:{title:'Hausloipe',body:'Die Hausloipe ist ein zentrales Element im Ticketing-System und muss beim Kauf einer Saisonkarte verpflichtend ausgewählt werden.\n\nSie definiert die primäre Nutzungsregion des Karteninhabers und wird über ein einfaches Dropdown-Menü im Kaufprozess festgelegt. Diese Auswahl bildet die Grundlage für das Clearing-System und die Umsatzverteilung.',note:'Implementierung: PRIOT Smart Track / FACTORY'},
    it:{title:'Pista di casa (Hausloipe)',body:'La pista di casa è un elemento centrale nel sistema di ticketing e deve essere obbligatoriamente selezionata al momento dell\'acquisto di una tessera stagionale.\n\nDefinisce la regione di utilizzo principale del titolare e viene stabilita tramite un semplice menu a tendina. Questa scelta è la base per il sistema di clearing e la distribuzione dei ricavi.',note:'Implementazione: PRIOT Smart Track / FACTORY'}},

  {type:'quad',tag:'Clearing-System',
    de:{title:'Clearing-System',items:[
      {h:'Finanzneutralität',b:'DNS agiert als neutraler Systemkoordinator ohne eigene Gewinnabsicht. Alle Einnahmen fließen direkt an die Regionen.'},
      {h:'Hausloipe-Prinzip',b:'Die gewählte Hausloipe bestimmt die primäre Zuordnung der Erlöse. Sie ist der Schlüssel zur fairen Verteilung.'},
      {h:'Erlösverteilung',b:'Einnahmen werden nach klaren Regeln an die teilnehmenden Regionen verteilt. Nutzungsdaten bilden die Basis.'},
      {h:'Transparenz',b:'Vollständige Nachvollziehbarkeit aller Geldflüsse. Jede Region erhält detaillierte Abrechnungen.'}]},
    it:{title:'Sistema di clearing',items:[
      {h:'Neutralità finanziaria',b:'DNS agisce come coordinatore neutrale. Tutti i ricavi affluiscono direttamente alle regioni.'},
      {h:'Principio Hausloipe',b:'La pista di casa scelta determina l\'attribuzione primaria dei ricavi.'},
      {h:'Distribuzione dei ricavi',b:'I ricavi vengono distribuiti alle regioni secondo regole chiare. I dati di utilizzo sono la base.'},
      {h:'Trasparenza',b:'Piena tracciabilità di tutti i flussi finanziari. Ogni regione riceve rendiconti dettagliati.'}]}},

  {type:'textimg',imgKey:18,tag:'Wochenkarte DNS / Tessera settimanale',
    de:{title:'Wochenkarte DNS',body:'Die Wochenkarte ist ein vollständig digitales Ticket. Nach dem Kauf wird es direkt auf das Smartphone heruntergeladen und im digitalen Wallet gespeichert – kompatibel mit Apple Wallet, Google Wallet und Samsung Wallet.\n\nKeine physische Karte, kein Ausdrucken – das Ticket ist jederzeit am Smartphone verfügbar. Ideal für Gäste: schneller Kauf, sofortige Nutzung und maximale Flexibilität.',note:'Implementierung: LTS Shop'},
    it:{title:'Tessera settimanale DNS',body:'La tessera settimanale è un biglietto completamente digitale. Dopo l\'acquisto viene scaricato sullo smartphone e salvato nel wallet digitale – compatibile con Apple Wallet, Google Wallet e Samsung Wallet.\n\nNessuna tessera fisica, nessuna stampa – il biglietto è sempre disponibile sullo smartphone. Ideale per gli ospiti: acquisto rapido, utilizzo immediato e massima flessibilità.',note:'Implementazione: LTS Shop'}},

  {type:'textimg',imgKey:19,tag:'Guest Card Integration',
    de:{title:'Guest Card Integration',body:'Die Guest Card Integration ermöglicht eine nahtlose Erweiterung bestehender Systeme. Durch eine Add-on-Logik können regionale Gästekarten einfach mit dem DNS-Ticketing verknüpft werden.\n\nDies schafft Mehrwert für Gäste und Regionen gleichermaßen, ohne bestehende Strukturen zu ersetzen.',note:'Implementierung: LTS Shop'},
    it:{title:'Integrazione Guest Card',body:'L\'integrazione della Guest Card consente un\'estensione seamless dei sistemi esistenti. Tramite una logica add-on, le guest card regionali possono essere collegate facilmente al sistema DNS.\n\nQuesto crea valore aggiunto per ospiti e regioni, senza sostituire le strutture esistenti.',note:'Implementazione: LTS Shop'}},

  {type:'textimg',imgKey:20,imgKey2:7,tag:'Tageskarten / Biglietti giornalieri',
    de:{title:'Tageskarten',body:'Das Tageskartensystem bleibt vollständig regional organisiert. Jede Region behält die volle Kontrolle über ihr Tageskartenangebot und kann Preise, Gültigkeit und Vertriebswege eigenständig festlegen.\n\nGäste haben freie Systemwahl ohne DNS-Vorgaben.',note:'Implementierung: bestehende regionale Systeme / optional UHF-Polesticker'},
    it:{title:'Biglietti giornalieri',body:'Il sistema dei biglietti giornalieri rimane completamente organizzato a livello regionale. Ogni regione mantiene il pieno controllo sulla propria offerta e può stabilire autonomamente prezzi, validità e canali di distribuzione.\n\nGli ospiti hanno libera scelta del sistema senza vincoli DNS.',note:'Implementazione: sistemi regionali esistenti / opz. UHF-Polesticker'}},

  {type:'product',tag:'Nutzergruppen / Gruppi di utenti',
    de:{title:'Nutzergruppen – 3-Stufen-Modell',items:[
      {h:'LOCAL – Regionale Nutzer',tech:'Einheimische mit RFID/UHF-Card im Armband-Träger und Hausloipe-Bindung. Stammkunden mit saisonalem Zugang zum gesamten DNS-Netzwerk.',note:'Saisonkarte',icon:'local'},
      {h:'GUEST – Einfacher Zugang',tech:'Gäste mit digitalem Wallet-Ticket (Wochenkarte) oder regionaler Tageskarte. Schneller Kauf, sofortige Nutzung, kein physischer Träger.',note:'Wochen-/Tageskarte',icon:'guest'},
      {h:'PREMIUM – Langfristige Bindung',tech:'Treue Nutzer mit erweiterten Vorteilen, Bonuspunkten und exklusiven Anreizen. Jede Gruppe erfordert spezifische Systemlogik.',note:'Loyalitätsprogramm',icon:'premium'}]},
    it:{title:'Gruppi di utenti – modello a 3 livelli',items:[
      {h:'LOCAL – Utenti regionali',tech:'Residenti con card RFID/UHF nel porta-card da braccio e pista di casa. Clienti fissi con accesso stagionale all\'intera rete DNS.',note:'Tessera stagionale',icon:'local'},
      {h:'GUEST – Accesso semplice',tech:'Ospiti con biglietto digitale nel Wallet (tessera settimanale) o biglietto giornaliero regionale. Acquisto rapido, utilizzo immediato.',note:'Tessera sett./giorn.',icon:'guest'},
      {h:'PREMIUM – Fidelizzazione',tech:'Utenti fedeli con vantaggi estesi, punti bonus e incentivi esclusivi. Ogni gruppo richiede una logica di sistema specifica.',note:'Programma fedeltà',icon:'premium'}]}},

  {type:'quad',tag:'Kontrollstrategie / Strategia di controllo',
    de:{title:'Kontrollstrategie',items:[
      {h:'Keine Flächenkontrolle',b:'Verzicht auf flächendeckende Kontrollen. Ressourcenschonender Ansatz ohne permanente Überwachung.'},
      {h:'Strategische Punkte',b:'Fokussierung auf neuralgische Kontrollpunkte an stark frequentierten Zugängen.'},
      {h:'Mobile Kontrolle',b:'Flexible Kontrollteams mit mobilen Geräten. Schnelle Reaktion nach Bedarf.'},
      {h:'Effiziente Umsetzung',b:'Schlanke Prozesse mit maximaler Wirkung bei minimalem Aufwand.'}]},
    it:{title:'Strategia di controllo',items:[
      {h:'Nessun controllo a tappeto',b:'Rinuncia a controlli capillari. Approccio risparmioso senza sorveglianza permanente.'},
      {h:'Punti strategici',b:'Concentrazione sui punti nevralgici agli accessi più frequentati.'},
      {h:'Controllo mobile',b:'Team di controllo flessibili con dispositivi mobili. Reazione rapida e interventi mirati.'},
      {h:'Attuazione efficiente',b:'Processi snelli con massimo effetto e sforzo minimo.'}]}},

  {type:'quad',tag:'Systemlogik Kontrolle / Logica sistema controllo',
    de:{title:'Systemlogik Kontrolle',items:[
      {h:'RFID-Kontrolle',b:'Saisonkarten-Inhaber werden über RFID/UHF-Card identifiziert. Schnelle, kontaktlose Erfassung.'},
      {h:'Kombinierte Nutzung',b:'Beide Systeme arbeiten parallel. Flexible Kontrolle je nach Ticketart.'},
      {h:'QR/Wallet-Kontrolle',b:'Wochenkarten werden über digitales Wallet-Ticket verifiziert. Einfaches Scannen.'},
      {h:'Nahtlose Verifikation',b:'Einheitliche Systemlogik. Minimaler Aufwand für Personal und Nutzer.'}]},
    it:{title:'Logica sistema controllo',items:[
      {h:'Controllo RFID',b:'I titolari di tessera stagionale vengono identificati tramite card RFID/UHF. Rilevamento rapido.'},
      {h:'Utilizzo combinato',b:'Entrambi i sistemi funzionano in parallelo. Controllo flessibile per tipo di biglietto.'},
      {h:'Controllo QR/Wallet',b:'Le tessere settimanali vengono verificate tramite biglietto digitale nel Wallet.'},
      {h:'Verifica seamless',b:'Logica di sistema uniforme. Sforzo minimo per il personale e gli utenti.'}]}},

  {type:'textimg',imgKey:null,tag:'Incentivierung / Incentivazione',
    de:{title:'Incentivierung',body:'Das Scansystem basiert auf Freiwilligkeit und einfacher Logik. Nutzer werden durch ein attraktives Belohnungssystem motiviert, ihre Karten an Kontrollpunkten zu scannen.\n\nDurch gezielte Anreize wie Rabatte, Bonuspunkte oder exklusive Vorteile entsteht eine Win-Win-Situation: höhere Datenqualität für DNS bei gleichzeitigem Mehrwert für die Nutzer.',note:'Mögliche Erweiterungen'},
    it:{title:'Incentivazione',body:'Il sistema di scansione si basa sulla volontarietà e su una logica semplice. Gli utenti sono motivati da un sistema di premi attrattivo a scansionare le loro tessere.\n\nGrazie a incentivi mirati come sconti, punti bonus o vantaggi esclusivi si crea una situazione win-win: maggiore qualità dei dati per DNS e valore aggiunto per gli utenti.',note:'Possibili estensioni'}},

  {type:'section',tag:'Zukunft & Vision / Futuro & Visione',

function d(s){return s[lang]||s.de;}

function render(s){
  var data=d(s);
  switch(s.type){

    case 'section':
      return '<div class="section-wrap">'+(s.num?'<div class="section-num">'+s.num+'</div>':'')+
        '<div class="section-title">'+data.title+'</div>'+
        (data.sub?'<div class="section-sub">'+data.sub+'</div>':'')+
        '</div>';

    case 'quad':
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="slide-title">'+data.title+'</div>'+
        '<div class="quad-grid">'+data.items.map(function(i){
          return '<div class="qcard"><h3>'+i.h+'</h3><p>'+i.b+'</p></div>';
        }).join('')+'</div>';

    case 'listright':
      var lritems='<div class="list-items">'+data.items.map(function(i){
        return '<div class="list-item"><h3>'+i.h+'</h3><p>'+i.b+'</p></div>';
      }).join('');
      if(data.links){
        lritems+='<div style="display:flex;flex-direction:column;gap:6px;margin-top:10px">'+
          data.links.map(function(l){return linkBtn(l.url,l.label);}).join('')+'</div>';
      }
      lritems+='</div>';
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="list-right">'+
        '<div class="list-right-title">'+data.title.replace(/\n/g,'<br>')+'</div>'+
        lritems+'</div>';

    case 'product':
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="slide-title">'+data.title+'</div>'+
        '<div class="product-list">'+data.items.map(function(i){
          return '<div class="product-item">'+
            '<div class="product-icon">'+(IC[i.icon]||'')+'</div>'+
            '<div style="flex:1"><h3>'+i.h+'</h3><div class="tech">'+i.tech+'</div></div>'+
            '<div class="product-note">'+i.note+'</div></div>';
        }).join('')+'</div>';

    case 'textimg':
      var right='';
      if(s.imgKey==='15ab'){
        right=imgSlider('15a','15b');
      } else if(s.imgKey2){
        right='<div>'+imgEl(s.imgKey,130)+'</div>'+
          '<div>'+imgEl(s.imgKey2,110)+
          '<div class="img-caption">RFID Skistocksticker (Polesticker)</div></div>';
        right='<div style="display:flex;flex-direction:column;gap:8px">'+right+'</div>';
      } else if(s.imgKey){
        right=imgEl(s.imgKey,220);
      }
      var vid=s.video?videoWidget(s.video):'';
      var tlink=s.pdflink?linkBtn(s.pdflink.url,s.pdflink.label,PDF_SVG):'';
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="two-col"><div>'+
        '<div class="slide-title">'+data.title.replace(/\n/g,'<br>')+'</div>'+
        data.body.split('\n\n').map(function(p){return '<p class="text-body">'+p+'</p>';}).join('')+
        (data.note?'<div class="text-note">'+data.note+'</div>':'')+
        tlink+
        '</div><div>'+right+vid+'</div></div>';

    case 'textimgpoints':
      var top2=s.imgKey?imgEl(s.imgKey,130):'';
      var wlink=s.link?linkBtn(s.link.url,s.link.label):'';
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="two-col"><div>'+
        '<div class="slide-title">'+data.title+'</div>'+
        data.body.split('\n\n').map(function(p){return '<p class="text-body">'+p+'</p>';}).join('')+
        wlink+
        '</div><div>'+top2+
        '<div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">'+
        data.items.map(function(i){
          return '<div style="border-left:3px solid var(--light);padding-left:11px">'+
            '<div style="font-size:12px;font-weight:700;color:var(--deep)">'+i.h+'</div>'+
            '<div style="font-size:12px;color:var(--muted);line-height:1.5">'+i.b+'</div></div>';
        }).join('')+'</div></div></div>';

    case 'pilot':
      var plink=s.link?'<div style="margin-top:10px">'+linkBtn(s.link.url,s.link.label,PDF_SVG)+'</div>':'';
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="pilot-grid">'+
        '<div><div class="pilot-box"><h2>'+data.title.replace(/\n/g,'<br>')+'</h2></div>'+plink+'</div>'+
        '<div class="pilot-items">'+data.items.map(function(i){
          return '<div class="pilot-item"><h3>'+i.h+'</h3><p>'+i.b+'</p></div>';
        }).join('')+'</div></div>';

    case 'roadmap':
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="slide-title">'+data.title+'</div>'+
        '<div class="roadmap-note">'+data.note+'</div>'+
        '<div class="roadmap-steps">'+data.steps.map(function(st){
          return '<div class="roadmap-step">'+
            '<div class="roadmap-year" style="background:'+st.col+'"><span style="color:'+st.tc+'">'+st.year+'</span></div>'+
            '<div class="roadmap-content"><h3>'+st.h+'</h3><p>'+st.b+'</p></div></div>';
        }).join('')+'</div>';

    case 'risiko':
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="slide-title">'+data.title+'</div>'+
        '<div class="risiko-list">'+data.items.map(function(i){
          return '<div class="risiko-item"><div class="risiko-dot"></div><p>'+i+'</p></div>';
        }).join('')+'</div>';

    case 'invest':
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="slide-title">'+data.title+'</div>'+
        '<div class="invest-grid">'+
        '<table class="inv-table"><tbody>'+data.rows.map(function(r){
          return '<tr class="'+(r.bold?'inv-bold':'')+(r.opt?' inv-opt':'')+'"><td>'+r.el+'</td><td style="text-align:right">'+r.val+'</td></tr>';
        }).join('')+'</tbody></table>'+
        '<div class="alt-box"><h3>'+data.alt.h+'</h3><p>'+data.alt.b+'</p></div></div>';

    case 'finanzierung':
      function ftbl(t){
        return '<div class="fin-wrap"><h3>'+t.title+'</h3>'+
          '<table class="fin-table"><tbody>'+t.rows.map(function(r){
            return '<tr class="'+(r.bold?'fin-bold':'')+'"><td>'+r.el+'</td><td style="text-align:right">'+r.val+'</td></tr>';
          }).join('')+'</tbody></table></div>';
      }
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="slide-title">'+data.title+'</div>'+
        '<div class="fin-grid">'+ftbl(data.dns)+ftbl(data.gsies)+'</div>';

    case 'dquote':
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div style="display:flex;align-items:center;justify-content:center;min-height:280px">'+
        '<div class="dec-quote" style="max-width:580px"><p style="font-size:17px;line-height:1.75">'+
        '&#8222;'+data.quote+'&#8220;</p></div></div>';

    case 'phase2':
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="slide-title">'+data.title+'</div>'+
        '<div class="phase2-grid">'+
        '<table class="fin-table"><tbody>'+data.rows.map(function(r){
          return '<tr><td>'+r.el+'</td><td style="text-align:right;color:var(--deep);font-weight:500">'+r.val+'</td></tr>';
        }).join('')+'</tbody></table>'+
        '<div class="phase2-mod"><h3>'+data.mod.title+'</h3><p>'+data.mod.intro+'</p>'+
        '<ul>'+data.mod.items.map(function(i){return '<li>'+i+'</li>';}).join('')+'</ul>'+
        '<p style="font-size:11px;color:var(--mid);margin-top:8px;font-style:italic">'+data.mod.note+'</p></div></div>';

    case 'decision':
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="slide-title">'+data.title+'</div>'+
        '<div class="decision-items">'+data.items.map(function(i){
          return '<div class="dec-item"><h3>'+i.h+'</h3><p>'+i.b+'</p></div>';
        }).join('')+'</div>'+
        '<div class="dec-quote"><p>&#8222;'+data.quote+'&#8220;</p></div>';

    case 'bullet':
      return (s.tag?'<div class="tag">'+s.tag+'</div>':'')+
        '<div class="slide-title">'+data.title+'</div>'+
        '<div class="bullet-wrap">'+
        '<p>'+data.intro+'</p>'+
        '<ul>'+data.checks.map(function(c){return '<li>'+c+'</li>';}).join('')+'</ul>'+
        '<h2>'+data.mid1+'</h2>'+
        '<h2 style="color:var(--mid);margin-bottom:4px">'+data.mid2+'</h2>'+
        '<div class="hl-box"><p>'+data.boxTitle+'</p>'+
        '<ul>'+data.boxItems.map(function(i){return '<li>'+i+'</li>';}).join('')+'</ul></div></div>';

    default: return '';
  }
}

function buildToc(){
  document.getElementById('toc').innerHTML=S.map(function(s,i){
    return '<button class="toc-item'+(i===cur?' active':'')+'" onclick="goTo('+i+')">'+
      '<span class="toc-num">'+(i+1)+'.</span>'+s.tag.substring(0,36)+'</button>';
  }).join('');
}

function paint(){
  document.getElementById('slide').innerHTML=render(S[cur]);
  document.getElementById('prog').style.width=((cur+1)/S.length*100)+'%';
  var L=lang==='de'
    ?{p:'← Zurück',n:'Weiter →',s:'Folie',o:'von',l:'IT'}
    :{p:'← Indietro',n:'Avanti →',s:'Diapositiva',o:'di',l:'DE'};
  document.getElementById('prevBtn').textContent=L.p;
  document.getElementById('nextBtn').textContent=L.n;
  document.getElementById('langBtn').textContent=L.l;
  document.getElementById('counter').textContent=L.s+' '+(cur+1)+' '+L.o+' '+S.length;
  document.getElementById('prevBtn').disabled=cur===0;
  document.getElementById('nextBtn').disabled=cur===S.length-1;
  buildToc();
}

function go(n){cur=Math.max(0,Math.min(S.length-1,cur+n));paint();}
function goTo(i){cur=i;document.getElementById('toc').classList.remove('open');document.getElementById('tocBtn').classList.remove('active');paint();}
function toggleToc(){document.getElementById('toc').classList.toggle('open');document.getElementById('tocBtn').classList.toggle('active');buildToc();}
function toggleLang(){lang=lang==='de'?'it':'de';paint();}

function toggleDocs(){
  var ov=document.getElementById('docsOverlay');
  var open=ov.classList.contains('open');
  if(open){
    ov.classList.remove('open');
  } else {
    var lastCat='';
    var html='';
    DOCS.forEach(function(doc){
      if(doc.cat!==lastCat){
        html+='<div class="docs-cat">'+doc.cat+'</div>';
        lastCat=doc.cat;
      }
      html+='<a href="'+doc.url+'" target="_blank" rel="noopener" class="docs-link">'+LINK_SVG+(lang==='de'?doc.de:doc.it)+'</a>';
    });
    document.getElementById('docsList').innerHTML=html;
    ov.classList.add('open');
  }
}

function toggleFs(){
  var el=document.documentElement;
  if(!document.fullscreenElement){
    (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen).call(el);
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||document.msExitFullscreen).call(document);
  }
}

document.addEventListener('fullscreenchange',function(){
  var btn=document.getElementById('fsBtn');
  var app=document.getElementById('app');
  var body=document.body;
  if(document.fullscreenElement){
    btn.textContent='✕';
    var sc=Math.min(window.screen.width/820,window.screen.height/700,2);
    body.style.cssText='margin:0;padding:0;background:#0D4D5E;display:flex;align-items:center;justify-content:center;min-height:100vh;';
    app.style.cssText='width:800px;transform:scale('+sc+');transform-origin:center center;';
  } else {
    btn.textContent='⛶';
    body.style.cssText='font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f6f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;';
    app.style.cssText='width:100%;max-width:800px;background:var(--white);border-radius:16px;box-shadow:0 4px 32px rgba(13,77,94,.12);overflow:hidden;';
  }
});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
  if(e.key==='f'||e.key==='F') toggleFs();
  if(e.key==='Escape'){if(document.fullscreenElement)document.exitFullscreen();}
});

paint();
</script>
</body>
</html>
